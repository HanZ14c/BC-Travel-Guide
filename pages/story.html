<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Story - BC Travel Guide</title>
        <meta charset="utf-8">

                <div class="top">
                    <img src="../images/Logo.png" width="100" height="100" alt="icon">

                </div>
                <nav>
                    <ul>
